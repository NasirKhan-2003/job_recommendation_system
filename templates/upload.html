<!DOCTYPE html>
<html>
<head>

    <title>Upload CV</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/projectstyle.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="main">

        <div class="topBar">
            <h2>CV Analyzer</h2>
        </div>

        <div class="pageContent">

            <p>
                Upload your CV and instantly get personalized job recommendations.
            </p>

            <!-- ✅ Error Message -->
            {% if error %}
                <div style="color:#ff4d4d; font-weight:500; margin-top:10px;">
                    {{ error }}
                </div>
            {% endif %}

            <!-- Upload Form -->
        <form action="/upload" method="post" enctype="multipart/form-data">
            <fieldset>

                <!-- File input -->
                <input type="file"
                    id="uploadButton"
                    name="cvfile"
                    accept=".pdf">

                <!-- Button -->
                <label for="uploadButton">SELECT PDF FILE</label>

                <!-- ✅ File name BELOW button -->
                <div id="fileInfo" style="margin-top:10px; font-size:13px; color:black;"></div>

                <div class="submitButton">
                    <input type="submit" value="Upload CV" onclick="return validateFile()">
                </div>

            </fieldset>
        </form>

                    <p style="font-size:12px; color:rgb(168, 0, 0);">
                        Only PDF files are allowed.
                    </p>

                </div>

            </div>

    <!-- Footer -->
    <div class="endFooter">
        <footer>
            @CV_Analyzer all rights reserved
        </footer>
    </div>

        <script>
            const fileInput = document.getElementById("uploadButton");
            const fileInfo = document.getElementById("fileInfo");

            fileInput.addEventListener("change", function () {
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const sizeKB = (file.size / 1024).toFixed(2);

                    fileInfo.innerHTML = `
                        <strong>File:</strong> ${file.name} <br>
                        <strong>Size:</strong> ${sizeKB} KB
                    `;
                } else {
                    fileInfo.innerHTML = "";
                }
            });

            function validateFile() {
                if (fileInput.files.length === 0) {
                    alert("Please select a PDF file before uploading.");
                    return false;
                }

                const file = fileInput.files[0];

                if (!file.name.toLowerCase().endsWith(".pdf")) {
                    alert("Only PDF files are allowed.");
                    return false;
                }

                return true;
            }
        </script>
</body>
</html>
